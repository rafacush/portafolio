<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Rafa Cush</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        :root {
            --bg-color: #F2F2F2; 
            --blue-cobalt: #0056FF; 
            --dark-navy: #1A1A1A; 
            --tag-bg: #E0E0E0; 
            --danger-red: #FF3B30;
        }

        body { margin: 0; background-color: var(--bg-color); font-family: 'Inter', sans-serif; color: var(--dark-navy); display: flex; justify-content: center; }
        .mobile-viewport { width: 100%; max-width: 414px; min-height: 100vh; position: relative; padding-bottom: 120px; display: flex; flex-direction: column; align-items: center; }
        .main-content { width: 90%; margin-top: 40px; }

        h1.main-title { font-size: 24px; font-weight: 900; text-transform: uppercase; margin: 0; }
        .tags-label { font-size: 14px; color: #666; margin-bottom: 15px; display: block; }

        .tags-container { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            white-space: nowrap; 
            margin-bottom: 25px; 
            min-height: 40px;
            width: 100%;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .tags-container::-webkit-scrollbar { display: none; }
        
        .tag-pill { 
            display: inline-block;
            flex: 0 0 auto;
            background-color: var(--tag-bg); 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: 0.2s; 
            border: none; 
            text-transform: capitalize; 
        }
        .tag-pill.active { background-color: var(--blue-cobalt); color: white; }

        .video-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        
        .video-card { 
            width: 100%; aspect-ratio: 1/1; background-color: #000; border-radius: 35px; 
            overflow: hidden; position: relative; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), 0 5px 15px rgba(0,0,0,0.1); 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .custom-poster { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 5; transition: 0.3s; }
        .video-card iframe, .video-card video { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
        .video-card.embed-short iframe { width: 100%; height: 115%; top: -7.5%; }

        .fullscreen-btn { position: absolute; bottom: 20px; right: 20px; width: 40px; height: 40px; background: rgba(0, 86, 255, 0.8); border: none; border-radius: 50%; color: white; font-size: 20px; z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .admin-controls { position: absolute; top: 20px; right: 20px; display: none; gap: 8px; z-index: 20; }
        .control-btn { width: 35px; height: 35px; border-radius: 50%; border: none; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-del { background: var(--danger-red); }
        .btn-move { background: var(--blue-cobalt); }
        .btn-edit-poster { background: #34C759; } /* Verde para el icono de imagen */

        .nav-bar { position: fixed; bottom: 30px; width: 280px; height: 55px; background-color: #000; border-radius: 30px; display: flex; align-items: center; justify-content: space-between; padding: 0 5px; z-index: 1000; }
        .nav-item { flex: 1; height: 45px; display: flex; align-items: center; justify-content: center; color: #FFF; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 25px; transition: 0.3s; }
        .nav-item.active { background-color: var(--blue-cobalt); }

        #adminBtn { display: none; position: fixed; top: 20px; left: 20px; width: 50px; height: 50px; background: var(--blue-cobalt); color: white; border-radius: 50%; border: none; font-size: 30px; z-index: 3000; }
        #adminMenu { display: none; position: fixed; top: 80px; left: 20px; width: 300px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 3000; border: 1px solid #ddd; overflow-y: auto; max-height: 70vh; }
        .input-admin { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; }
        .btn-save { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: var(--blue-cobalt); color: white; }

        #cropperContainer { width: 100%; height: 200px; margin-bottom: 10px; border-radius: 10px; overflow: hidden; border: 2px dashed #ccc; display: none; position: relative; }
        #cropperImage { max-width: 100%; display: block; }
    </style>
</head>
<body>

<div class="mobile-viewport">
    <div class="main-content">
        <h1 class="main-title">PROYECTOS DESTACADOS</h1>
        <span class="tags-label">#tags</span>
        <div class="tags-container" id="dynamicTags"></div>
        <div id="inicio" class="page active"><div class="video-grid" id="videoGrid"></div></div>
        <div id="sobremi" class="page" style="display:none;"><div style="background:white; padding:30px; border-radius:25px; text-align: center;"><h2>Rafa Cush</h2><p>Filmmaker & Editor</p></div></div>
    </div>
    <div class="nav-bar"><div class="nav-item active" onclick="showPage('inicio', this)">INICIO</div><div class="nav-item" onclick="showPage('sobremi', this)">SOBRE MÍ</div></div>
</div>

<input type="file" id="updatePosterInput" style="display:none" accept="image/*">

<button id="adminBtn" onclick="toggleAdminMenu()">+</button>
<div id="adminMenu">
    <h3>Nuevo Proyecto</h3>
    <select id="mediaType" class="input-admin" onchange="updateAdminForm()">
        <option value="embed">Enlace (URL)</option>
        <option value="local">Archivo Directo</option>
    </select>
    <textarea id="embedInput" class="input-admin" placeholder="Pega URL de YouTube/Instagram..."></textarea>
    <div id="localSection" style="display:none;">
        <input type="file" id="localFileInput" class="input-admin" accept="video/*,image/*">
    </div>
    <label style="font-size:12px; font-weight:bold;">Portada (Opcional):</label>
    <input type="file" id="posterInput" class="input-admin" accept="image/*" onchange="initCropper(this, 'main')">
    <div id="cropperContainer"><img id="cropperImage" src=""></div>
    <input type="text" id="projectTags" class="input-admin" placeholder="Tags (ej: comercial, boda)">
    <button class="btn-save" id="saveButton" onclick="addProject()">GUARDAR PROYECTO</button>
</div>

<script>
    let devMode = false;
    let currentTag = 'todos';
    let db = JSON.parse(localStorage.getItem('rafa_db_v4_fix')) || [];
    let cropperInstance = null;
    let editingProjectIndex = null;

    window.addEventListener('keydown', (e) => {
        if (e.shiftKey && (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'p') {
            e.preventDefault();
            devMode = !devMode;
            document.getElementById('adminBtn').style.display = devMode ? 'block' : 'none';
            renderAll();
        }
    });

    function toggleAdminMenu() {
        const m = document.getElementById('adminMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function updateAdminForm() {
        const type = document.getElementById('mediaType').value;
        document.getElementById('embedInput').style.display = type === 'embed' ? 'block' : 'none';
        document.getElementById('localSection').style.display = type === 'local' ? 'block' : 'none';
    }

    function initCropper(input, mode, index = null) {
        const file = input.files[0];
        const container = document.getElementById('cropperContainer');
        const image = document.getElementById('cropperImage');
        
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if (mode === 'main') {
                    image.src = e.target.result;
                    container.style.display = 'block';
                    if (cropperInstance) cropperInstance.destroy();
                    cropperInstance = new Cropper(image, { aspectRatio: 1/1, viewMode: 1 });
                } else if (mode === 'update') {
                    // Para actualizar portada existente, abrimos menú temporal
                    editingProjectIndex = index;
                    image.src = e.target.result;
                    container.style.display = 'block';
                    if (cropperInstance) cropperInstance.destroy();
                    cropperInstance = new Cropper(image, { aspectRatio: 1/1, viewMode: 1 });
                    
                    // Mostramos el menú para que el usuario pueda darle a "Guardar" 
                    // o añadimos un botón de confirmación rápido
                    if(confirm("¿Quieres aplicar esta nueva portada?")) {
                        applyNewPoster();
                    }
                }
            };
            reader.readAsDataURL(file);
        }
    }

    function applyNewPoster() {
        if (!cropperInstance || editingProjectIndex === null) return;
        const posterData = cropperInstance.getCroppedCanvas({ width: 500, height: 500 }).toDataURL('image/jpeg', 0.7);
        db[editingProjectIndex].poster = posterData;
        localStorage.setItem('rafa_db_v4_fix', JSON.stringify(db));
        location.reload();
    }

    function getEmbedUrl(input) {
        const ytMatch = input.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/);
        if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1`;
        const igMatch = input.match(/(?:instagram\.com\/(?:reel|p)\/)([^/?#&]+)/);
        if (igMatch) return `https://www.instagram.com/reel/${igMatch[1]}/embed/`;
        return input;
    }

    function renderAll() {
        const grid = document.getElementById('videoGrid');
        const tagContainer = document.getElementById('dynamicTags');
        const tagsSet = new Set(['todos']);
        db.forEach(item => item.tags.forEach(t => tagsSet.add(t.trim().toLowerCase())));
        tagContainer.innerHTML = Array.from(tagsSet).map(t => `<button class="tag-pill ${currentTag === t ? 'active' : ''}" onclick="filterByTag('${t}')">${t}</button>`).join('');

        grid.innerHTML = db.map((item, i) => {
            if (currentTag !== 'todos' && !item.tags.includes(currentTag)) return '';
            const isShort = item.content.includes('instagram.com') || (item.content.includes('youtube.com/shorts'));
            
            return `
            <div class="video-card ${isShort ? 'embed-short' : ''}" id="card-${i}" onclick="loadVideo(${i})">
                ${item.poster ? `<img src="${item.poster}" class="custom-poster" id="poster-${i}">` : ''}
                <div id="video-container-${i}"></div>
                <div class="admin-controls" style="display: ${devMode ? 'flex' : 'none'}">
                    <button class="control-btn btn-edit-poster" onclick="event.stopPropagation(); triggerUpdatePoster(${i})">📸</button>
                    <button class="control-btn btn-move" onclick="event.stopPropagation(); moveItem(${i}, -1)">↑</button>
                    <button class="control-btn btn-move" onclick="event.stopPropagation(); moveItem(${i}, 1)">↓</button>
                    <button class="control-btn btn-del" onclick="event.stopPropagation(); deleteProject(${i})">✕</button>
                </div>
                ${isShort ? `<button class="fullscreen-btn" onclick="event.stopPropagation(); toggleFullscreen('card-${i}')">⛶</button>` : ''}
            </div>`;
        }).join('');
    }

    function triggerUpdatePoster(index) {
        editingProjectIndex = index;
        const input = document.getElementById('updatePosterInput');
        input.onchange = (e) => initCropper(e.target, 'update', index);
        input.click();
    }

    function loadVideo(index) {
        const item = db[index];
        const container = document.getElementById(`video-container-${index}`);
        const poster = document.getElementById(`poster-${index}`);
        if(poster) poster.style.opacity = '0';
        if (item.type === 'local') {
            container.innerHTML = `<video src="${item.content}" controls autoplay></video>`;
        } else {
            container.innerHTML = `<iframe src="${getEmbedUrl(item.content)}" allow="autoplay"></iframe>`;
        }
    }

    function addProject() {
        const type = document.getElementById('mediaType').value;
        const tags = document.getElementById('projectTags').value.split(',').map(t => t.trim().toLowerCase());
        const btn = document.getElementById('saveButton');
        
        btn.innerText = "GUARDANDO...";
        btn.disabled = true;

        let posterData = null;
        if (cropperInstance) {
            posterData = cropperInstance.getCroppedCanvas({ width: 500, height: 500 }).toDataURL('image/jpeg', 0.7);
        }

        const saveData = (content, isImg) => {
            try {
                db.unshift({ type, content, tags, isImage: isImg, poster: posterData });
                localStorage.setItem('rafa_db_v4_fix', JSON.stringify(db));
                location.reload(); 
            } catch (e) {
                alert("Error: El archivo es demasiado grande. Usa enlaces externos.");
                btn.innerText = "GUARDAR PROYECTO";
                btn.disabled = false;
            }
        };

        if (type === 'local') {
            const file = document.getElementById('localFileInput').files[0];
            if (!file) { alert("Selecciona un archivo local."); btn.disabled = false; return; }
            const reader = new FileReader();
            reader.onload = (e) => saveData(e.target.result, file.type.startsWith('image/'));
            reader.readAsDataURL(file);
        } else {
            const url = document.getElementById('embedInput').value.trim();
            if (!url) { alert("Pega un enlace."); btn.disabled = false; return; }
            saveData(url, false);
        }
    }

    function moveItem(index, d) {
        const ni = index + d;
        if (ni >= 0 && ni < db.length) {
            const t = db[index]; db[index] = db[ni]; db[ni] = t;
            localStorage.setItem('rafa_db_v4_fix', JSON.stringify(db));
            renderAll();
        }
    }

    function deleteProject(index) {
        if(confirm("¿Eliminar?")) {
            db.splice(index, 1);
            localStorage.setItem('rafa_db_v4_fix', JSON.stringify(db));
            renderAll();
        }
    }

    function filterByTag(tag) { currentTag = tag; renderAll(); }

    function showPage(pId, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pId).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    window.onload = renderAll;
</script>
</body>
</html>
