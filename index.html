<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Rafa Cush</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        :root {
            --bg-color: #F2F2F2; 
            --blue-cobalt: #0056FF; 
            --dark-navy: #1A1A1A; 
            --tag-bg: #E0E0E0; 
            --danger-red: #FF3B30;
        }

        body { margin: 0; background-color: var(--bg-color); font-family: 'Inter', sans-serif; color: var(--dark-navy); display: flex; justify-content: center; }
        .mobile-viewport { width: 100%; max-width: 414px; min-height: 100vh; position: relative; padding-bottom: 120px; display: flex; flex-direction: column; align-items: center; }
        .main-content { width: 90%; margin-top: 40px; }

        h1.main-title { font-size: 24px; font-weight: 900; text-transform: uppercase; margin: 0; }
        .tags-label { font-size: 14px; color: #666; margin-bottom: 15px; display: block; }

        .tags-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; min-height: 40px; }
        .tag-pill { background-color: var(--tag-bg); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; border: none; text-transform: capitalize; }
        .tag-pill.active { background-color: var(--blue-cobalt); color: white; }

        .video-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        
        /* Contenedor base de la tarjeta */
        .video-card { 
            width: 100%; aspect-ratio: 1/1; background-color: #000; border-radius: 35px; 
            overflow: hidden; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            display: flex; align-items: center; justify-content: center;
        }

        /* Estilos por defecto (YouTube y Local) */
        .video-card iframe, .video-card video, .video-card img { 
            width: 100%; height: 100%; border: none; object-fit: cover; 
            position: absolute; top: 0; left: 0;
        }

        /* CORRECCIÓN: Recorte especial SOLO para Instagram */
        .video-card.instagram-embed iframe { 
            width: 100%; height: 115%; /* Más alto para empujar la UI */
            position: absolute; top: -7.5%; /* Centrado vertical para recortar arriba y abajo */
            scrolling: no;
        }

        .fullscreen-btn {
            position: absolute; bottom: 20px; right: 20px;
            width: 40px; height: 40px; background: rgba(0, 86, 255, 0.8);
            border: none; border-radius: 50%; color: white; font-size: 20px;
            cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        /* Botón de Eliminar (Solo visible en Modo Dev) */
        .delete-btn {
            position: absolute; top: 20px; right: 20px;
            width: 35px; height: 35px; background: var(--danger-red);
            border: none; border-radius: 50%; color: white; font-weight: bold;
            cursor: pointer; z-index: 15; display: none; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .nav-bar { position: fixed; bottom: 30px; width: 280px; height: 55px; background-color: #000; border-radius: 30px; display: flex; align-items: center; justify-content: space-between; padding: 0 5px; z-index: 1000; }
        .nav-item { flex: 1; height: 45px; display: flex; align-items: center; justify-content: center; color: #FFF; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 25px; transition: 0.3s; }
        .nav-item.active { background-color: var(--blue-cobalt); }

        #adminBtn { display: none; position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: var(--blue-cobalt); color: white; border-radius: 50%; border: none; font-size: 30px; z-index: 3000; }
        #adminMenu { display: none; position: fixed; top: 80px; right: 20px; width: 300px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 3000; border: 1px solid #ddd; }
        .input-admin { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; }
        .btn-save { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: var(--blue-cobalt); color: white; }

        /* Contenedor del Editor de Recorte */
        #cropperContainer { width: 100%; height: 200px; margin-bottom: 10px; border-radius: 10px; overflow: hidden; border: 2px dashed #ccc; display: none; position: relative; }
        #cropperImage { max-width: 100%; display: block; }
    </style>
</head>
<body>

<div class="mobile-viewport">
    <div class="main-content">
        <h1 class="main-title">PROYECTOS DESTACADOS</h1>
        <span class="tags-label">#tags</span>
        <div class="tags-container" id="dynamicTags"></div>
        <span style="font-weight:700; display:block; margin-bottom:15px;">Mas recientes</span>
        <div id="inicio" class="page active"><div class="video-grid" id="videoGrid"></div></div>
        <div id="sobremi" class="page" style="display:none;"><div style="background:white; padding:30px; border-radius:25px; text-align: center;"><h2>Rafa Cush</h2><p>Filmmaker & Editor</p></div></div>
    </div>
    <div class="nav-bar"><div class="nav-item active" onclick="showPage('inicio', this)">INICIO</div><div class="nav-item" onclick="showPage('sobremi', this)">SOBRE MÍ</div></div>
</div>

<button id="adminBtn" onclick="toggleAdminMenu()">+</button>
<div id="adminMenu">
    <h3>Nuevo Proyecto</h3>
    <select id="mediaType" class="input-admin" onchange="updateAdminForm()">
        <option value="embed">URL (YouTube / Instagram)</option>
        <option value="local">Archivo (Video/Foto)</option>
    </select>
    <textarea id="embedInput" class="input-admin" placeholder="Pega URL..."></textarea>
    <input type="file" id="localFileInput" class="input-admin" style="display:none;" accept="video/*,image/*">
    <label style="font-size:12px;">Portada y Recorte:</label>
    <input type="file" id="posterInput" class="input-admin" accept="image/*" onchange="initCropper(this)">
    <div id="cropperContainer"><img id="cropperImage" src=""></div>
    <input type="text" id="projectTags" class="input-admin" placeholder="Tags (ej: fitness, cafe)">
    <button class="btn-save" onclick="addProject()">GUARDAR PROYECTO</button>
</div>

<script>
    let devMode = false;
    let currentTag = 'todos';
    let db = JSON.parse(localStorage.getItem('rafa_db_master_v1')) || [];
    let cropperInstance = null;

    window.addEventListener('keydown', (e) => {
        if (e.shiftKey && (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'p') {
            e.preventDefault();
            devMode = !devMode;
            document.getElementById('adminBtn').style.display = devMode ? 'block' : 'none';
            renderAll(); // Refrescar para mostrar/ocultar controles de administración
        }
    });

    function toggleAdminMenu() {
        const m = document.getElementById('adminMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
        if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
        document.getElementById('cropperContainer').style.display = 'none';
    }

    function updateAdminForm() {
        const type = document.getElementById('mediaType').value;
        document.getElementById('embedInput').style.display = type === 'embed' ? 'block' : 'none';
        document.getElementById('localFileInput').style.display = type === 'local' ? 'block' : 'none';
    }

    function initCropper(input) {
        const file = input.files[0];
        const container = document.getElementById('cropperContainer');
        const image = document.getElementById('cropperImage');
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                image.src = e.target.result;
                container.style.display = 'block';
                if (cropperInstance) cropperInstance.destroy();
                cropperInstance = new Cropper(image, { aspectRatio: 1/1, viewMode: 1, zoomable: true, movable: true });
            };
            reader.readAsDataURL(file);
        }
    }

    function getEmbedUrl(input) {
        const ytMatch = input.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/);
        if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}?enablejsapi=1&autoplay=0`;
        const igMatch = input.match(/(?:instagram\.com\/(?:reel|p)\/)([^/?#&]+)/);
        if (igMatch) return `https://www.instagram.com/reel/${igMatch[1]}/embed/captioned/`;
        return input;
    }

    function renderAll() {
        const grid = document.getElementById('videoGrid');
        const tagContainer = document.getElementById('dynamicTags');
        const tagsSet = new Set(['todos']);
        db.forEach(item => item.tags.forEach(t => tagsSet.add(t.trim().toLowerCase())));
        tagContainer.innerHTML = Array.from(tagsSet).map(t => `<button class="tag-pill ${currentTag === t ? 'active' : ''}" onclick="filterByTag('${t}')">${t}</button>`).join('');

        grid.innerHTML = db.map((item, i) => {
            if (currentTag !== 'todos' && !item.tags.includes(currentTag)) return '';
            
            let contentHtml = "";
            let extraClass = "";

            if (item.type === 'local') {
                contentHtml = item.isImage ? `<img src="${item.content}">` : `<video src="${item.content}" controls poster="${item.poster || ''}"></video>`;
            } else {
                const url = getEmbedUrl(item.content);
                // Detectar si es Instagram para aplicar el recorte especial
                if (item.content.includes('instagram.com')) extraClass = "instagram-embed";
                contentHtml = `<iframe src="${url}" scrolling="no"></iframe>`;
            }

            return `<div class="video-card ${extraClass}" id="card-${i}">
                ${contentHtml}
                <button class="delete-btn" style="display: ${devMode ? 'flex' : 'none'}" onclick="deleteProject(${i})">✕</button>
                <button class="fullscreen-btn" onclick="toggleFullscreen('card-${i}')">⛶</button>
            </div>`;
        }).join('');
    }

    function deleteProject(index) {
        if(confirm("¿Estás seguro de que quieres eliminar este video?")) {
            db.splice(index, 1);
            saveAndRefresh();
        }
    }

    function toggleFullscreen(id) {
        const elem = document.getElementById(id);
        if (!document.fullscreenElement) elem.requestFullscreen();
        else document.exitFullscreen();
    }

    function filterByTag(tag) { currentTag = tag; renderAll(); }

    function addProject() {
        const type = document.getElementById('mediaType').value;
        const tags = document.getElementById('projectTags').value.split(',').map(t => t.trim().toLowerCase());
        let posterData = "";
        const processSave = (mainContent, isImg) => {
            if (cropperInstance) posterData = cropperInstance.getCroppedCanvas({ width: 400, height: 400 }).toDataURL('image/jpeg', 0.8);
            db.push({ type, content: mainContent, tags, isImage: isImg, poster: posterData });
            saveAndRefresh();
        };
        if (type === 'local') {
            const file = document.getElementById('localFileInput').files[0];
            const reader = new FileReader();
            reader.onload = (e) => processSave(e.target.result, file.type.startsWith('image/'));
            reader.readAsDataURL(file);
        } else processSave(document.getElementById('embedInput').value.trim(), false);
    }

    function saveAndRefresh() {
        localStorage.setItem('rafa_db_master_v1', JSON.stringify(db));
        if (cropperInstance) cropperInstance.destroy();
        document.getElementById('cropperContainer').style.display = 'none';
        renderAll();
        if(document.getElementById('adminMenu').style.display === 'block') toggleAdminMenu();
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    window.onload = renderAll;
</script>
</body>
</html>
